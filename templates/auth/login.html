{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <h2 style="text-align:center; color: var(--dark-green); margin-bottom: 2rem;">Login to Your Account</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn-primary add-to-cart-btn">Login</button>
    </form>
    <div class="auth-links">
        <p>Don't have an account? <a href="{{ url_for('register') }}">Sign up here</a></p>
    </div>
</div>
{% endblock %}
